<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wetter Rottweil</title>

<style>
:root{
    --bg:#0f172a;
    --card:#1e293b;
    --text:#f8fafc;
    --accent:#38bdf8;
    --secondary:#94a3b8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:var(--text);
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.card{
    background:var(--card);
    border-radius:16px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

.current{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
}

.current-left{
    display:flex;
    align-items:center;
    gap:15px;
}

.current img{
    width:80px;
}

.temp{
    font-size:3rem;
    font-weight:bold;
}

.description{
    color:var(--secondary);
}

.hourly{
    display:flex;
    gap:15px;
    overflow-x:auto;
    padding-top:10px;
}

.hour-card{
    min-width:110px;
    text-align:center;
    background:#334155;
    border-radius:12px;
    padding:10px;
}

.hour-card img{
    width:40px;
}

.daily{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:15px;
}

.day-card{
    background:#334155;
    border-radius:12px;
    padding:15px;
    text-align:center;
}

.day-card img{
    width:50px;
}

.small{
    color:var(--secondary);
    font-size:0.9rem;
}

.loading{
    text-align:center;
    padding:30px;
}
</style>
</head>
<body>

<div class="container">

<h1>🌤 Wetter in Rottweil</h1>

<div id="current" class="card loading">
    Wetter wird geladen...
</div>

<div class="card">
    <h2>Nächste Stunden</h2>
    <div id="hourly" class="hourly"></div>
</div>

<div class="card">
    <h2>Nächste Tage</h2>
    <div id="daily" class="daily"></div>
</div>

</div>

<script>

// Rottweil
const LAT = 48.1678;
const LON = 8.6272;

const iconUrl = icon =>
    icon
        ? `https://brightsky.dev/static/icons/${icon}.png`
        : "https://brightsky.dev/static/icons/partly-cloudy-day.png";

async function loadWeather() {

    try {

        const now = new Date();
        const end = new Date();
        end.setDate(end.getDate() + 7);

        const weatherUrl =
            `https://api.brightsky.dev/weather?lat=${LAT}&lon=${LON}` +
            `&date=${now.toISOString()}` +
            `&last_date=${end.toISOString()}`;

        const currentUrl =
            `https://api.brightsky.dev/current_weather?lat=${LAT}&lon=${LON}`;

        const [weatherRes, currentRes] = await Promise.all([
            fetch(weatherUrl),
            fetch(currentUrl)
        ]);

        const weatherData = await weatherRes.json();
        const currentData = await currentRes.json();

        renderCurrent(currentData.weather);
        renderHourly(weatherData.weather);
        renderDaily(weatherData.weather);

    } catch(err) {
        console.error(err);
        document.getElementById("current").innerHTML =
            "<p>Fehler beim Laden der Wetterdaten.</p>";
    }
}

function renderCurrent(data){

    document.getElementById("current").innerHTML = `
        <div class="current">
            <div class="current-left">
                <img src="${iconUrl(data.icon)}" alt="">
                <div>
                    <div class="temp">${Math.round(data.temperature)}°C</div>
                    <div class="description">${data.condition || ""}</div>
                </div>
            </div>

            <div>
                <div>💨 ${Math.round(data.wind_speed || 0)} km/h</div>
                <div>💧 ${data.relative_humidity || "-"} %</div>
                <div>🌡 ${Math.round(data.temperature)}°C</div>
            </div>
        </div>
    `;
}

function renderHourly(entries){

    const container = document.getElementById("hourly");

    const next24 = entries.slice(0,24);

    container.innerHTML = next24.map(item => {

        const date = new Date(item.timestamp);

        return `
        <div class="hour-card">
            <div>${date.toLocaleTimeString('de-DE',{
                hour:'2-digit',
                minute:'2-digit'
            })}</div>

            <img src="${iconUrl(item.icon)}">

            <div><strong>${Math.round(item.temperature)}°</strong></div>

            <div class="small">
                ${item.precipitation_probability ?? 0}%
            </div>
        </div>
        `;
    }).join("");
}

function renderDaily(entries){

    const dailyMap = {};

    entries.forEach(item => {

        const date = item.timestamp.substring(0,10);

        if(!dailyMap[date]){
            dailyMap[date] = [];
        }

        dailyMap[date].push(item);
    });

    const days = Object.entries(dailyMap)
        .slice(0,7)
        .map(([date,data]) => {

            const temps = data
                .map(x => x.temperature)
                .filter(Boolean);

            const max = Math.max(...temps);
            const min = Math.min(...temps);

            const midday =
                data.find(x =>
                    new Date(x.timestamp).getHours() === 12
                ) || data[0];

            return {
                date,
                max,
                min,
                icon: midday.icon
            };
        });

    document.getElementById("daily").innerHTML = days.map(day => {

        const d = new Date(day.date);

        return `
        <div class="day-card">

            <h3>${d.toLocaleDateString('de-DE',{
                weekday:'short'
            })}</h3>

            <img src="${iconUrl(day.icon)}">

            <p>
                <strong>${Math.round(day.max)}°</strong>
                /
                ${Math.round(day.min)}°
            </p>

            <div class="small">
                ${d.toLocaleDateString('de-DE')}
            </div>

        </div>
        `;
    }).join("");
}

loadWeather();

// alle 10 Minuten aktualisieren
setInterval(loadWeather, 600000);

</script>

</body>
</html>
