<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wetter Rottweil</title>
<meta name="description" content="Aktuelles Wetter und Prognose für Rottweil über Bright Sky (DWD).">
<style>
body{font-family:system-ui,sans-serif;max-width:1100px;margin:auto;padding:20px;background:#f5f7fa}
.card{background:#fff;border-radius:12px;padding:16px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.item{background:#eef4fa;padding:10px;border-radius:8px}
.small{font-size:.9rem;color:#555}
</style>
</head>
<body>
<h1>🌤 Wetter in Rottweil</h1>

<div class="card">
<h2>Aktuelles Wetter</h2>
<div id="current">Lade Daten...</div>
</div>

<div class="card">
<h2>Prognose (24 Stunden)</h2>
<div id="forecast" class="grid"></div>
</div>

<script>
const LAT = 48.1678;
const LON = 8.6272;

async function loadWeather() {
  try {
    const currentRes = await fetch(
      `https://api.brightsky.dev/current_weather?lat=${LAT}&lon=${LON}`
    );

    const forecastRes = await fetch(
      `https://api.brightsky.dev/weather?lat=${LAT}&lon=${LON}`
    );

    if (!currentRes.ok) {
      throw new Error("Current Weather HTTP " + currentRes.status);
    }

    if (!forecastRes.ok) {
      throw new Error("Forecast HTTP " + forecastRes.status);
    }

    const currentData = await currentRes.json();
    const forecastData = await forecastRes.json();

    console.log("Current:", currentData);
    console.log("Forecast:", forecastData);

    const current = currentData.weather;

    if (!current) {
      throw new Error("Kein weather-Objekt gefunden");
    }

    document.getElementById("current").innerHTML = `
      <div>
        <b>Temperatur:</b> ${current.temperature ?? "-"} °C<br>
        <b>Wind:</b> ${current.wind_speed ?? "-"} km/h<br>
        <b>Feuchtigkeit:</b> ${current.relative_humidity ?? "-"} %<br>
        <b>Zustand:</b> ${current.condition ?? "-"}
      </div>
    `;

    const forecast = forecastData.weather || [];

    document.getElementById("forecast").innerHTML =
      forecast.slice(0, 24).map(item => `
        <div class="item">
          <b>${new Date(item.timestamp).toLocaleString("de-DE")}</b><br>
          ${item.temperature ?? "-"} °C
        </div>
      `).join("");

  } catch (err) {
    console.error(err);

    document.getElementById("current").innerHTML =
      "<pre>" + err.message + "</pre>";
  }
}

loadWeather();
</script>
</body>
</html>
