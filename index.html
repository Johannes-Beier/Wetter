<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wetter Rottweil</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:20px;
    background:#f5f5f5;
}

h1,h2{
    margin-top:30px;
}

.section{
    background:white;
    border-radius:12px;
    padding:15px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.horizontal-scroll{
    overflow-x:auto;
    white-space:nowrap;
    padding-bottom:10px;
}

.card{
    display:inline-block;
    vertical-align:top;
    width:180px;
    margin-right:12px;
    padding:12px;
    border-radius:10px;
    background:#fafafa;
    border:1px solid #ddd;
}

.card img{
    width:64px;
    height:64px;
}

.current-grid{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.current-item{
    background:#fafafa;
    border:1px solid #ddd;
    border-radius:10px;
    padding:10px;
    min-width:150px;
}

.chart-container{
    min-width:900px;
    height:350px;
}

.loading{
    color:#666;
}
</style>
</head>
<body>

<h1>🌤 Wetter Rottweil</h1>

<div class="section">
    <h2>Aktuelles Wetter</h2>
    <div id="current" class="loading">Lade Daten...</div>
</div>

<div class="section">
    <h2>Nächste 24 Stunden</h2>
    <div id="hourly" class="horizontal-scroll"></div>
</div>

<div class="section">
    <h2>Temperatur heute</h2>
    <div class="horizontal-scroll">
        <div class="chart-container">
            <canvas id="tempChart"></canvas>
        </div>
    </div>
</div>

<div class="section">
    <h2>Luftfeuchtigkeit heute</h2>
    <div class="horizontal-scroll">
        <div class="chart-container">
            <canvas id="humidityChart"></canvas>
        </div>
    </div>
</div>

<div class="section">
    <h2>Windgeschwindigkeit heute</h2>
    <div class="horizontal-scroll">
        <div class="chart-container">
            <canvas id="windChart"></canvas>
        </div>
    </div>
</div>

<div class="section">
    <h2>7-Tage-Vorhersage</h2>
    <div id="daily" class="horizontal-scroll"></div>
</div>

<script>

const LAT = 48.1678;
const LON = 8.6272;

const iconUrl = icon =>
    `https://brightsky.dev/static/icons/${icon}`;

function formatHour(date){
    return new Date(date).toLocaleTimeString(
        "de-DE",
        {hour:"2-digit", minute:"2-digit"}
    );
}

function formatDate(date){
    return new Date(date).toLocaleDateString(
        "de-DE",
        {
            weekday:"short",
            day:"2-digit",
            month:"2-digit"
        }
    );
}

async function loadWeather(){

    try{

        const now = new Date();

        const startToday =
            new Date(
                now.getFullYear(),
                now.getMonth(),
                now.getDate(),
                0,0,0
            );

        const endToday =
            new Date(
                now.getFullYear(),
                now.getMonth(),
                now.getDate(),
                23,59,59
            );

        const weatherUrl =
            `https://api.brightsky.dev/weather?lat=${LAT}&lon=${LON}`;

        const dailyUrl =
            `https://api.brightsky.dev/daily?lat=${LAT}&lon=${LON}`;

        const [weatherRes,dailyRes] =
            await Promise.all([
                fetch(weatherUrl),
                fetch(dailyUrl)
            ]);

        const weatherData =
            await weatherRes.json();

        const dailyData =
            await dailyRes.json();

        const current =
            weatherData.weather[0];

        renderCurrent(current);

        renderHourly(weatherData.weather);

        renderCharts(weatherData.weather);

        renderDaily(dailyData.weather);

    }
    catch(err){
        console.error(err);
        document.getElementById("current").innerHTML =
            "Fehler beim Laden der Wetterdaten.";
    }
}

function renderCurrent(data){

    document.getElementById("current").innerHTML = `
        <div class="current-grid">

            <div class="current-item">
                <img src="${iconUrl(data.icon)}">
            </div>

            <div class="current-item">
                <strong>Temperatur</strong><br>
                ${data.temperature} °C
            </div>

            <div class="current-item">
                <strong>Bewölkung</strong><br>
                ${data.cloud_cover} %
            </div>

            <div class="current-item">
                <strong>Windrichtung</strong><br>
                ${data.wind_direction}°
            </div>

            <div class="current-item">
                <strong>Wind</strong><br>
                ${data.wind_speed} km/h
            </div>

            <div class="current-item">
                <strong>Luftfeuchtigkeit</strong><br>
                ${data.relative_humidity} %
            </div>

            <div class="current-item">
                <strong>Luftdruck</strong><br>
                ${data.pressure_msl} hPa
            </div>

        </div>
    `;
}

function renderHourly(weather){

    const container =
        document.getElementById("hourly");

    container.innerHTML = "";

    weather.slice(0,24).forEach(hour=>{

        container.innerHTML += `
            <div class="card">
                <div>${formatHour(hour.timestamp)}</div>

                <img
                    src="${iconUrl(hour.icon)}"
                    alt=""
                >

                <div>${hour.temperature} °C</div>
                <div>${hour.cloud_cover}% Wolken</div>
                <div>${hour.wind_speed} km/h</div>
            </div>
        `;
    });
}

function renderDaily(days){

    const container =
        document.getElementById("daily");

    container.innerHTML = "";

    days.slice(0,7).forEach(day=>{

        container.innerHTML += `
            <div class="card">

                <div>
                    <strong>
                        ${formatDate(day.date)}
                    </strong>
                </div>

                <img
                    src="${iconUrl(day.icon)}"
                    alt=""
                >

                <div>
                    Max: ${day.temperature_max} °C
                </div>

                <div>
                    Min: ${day.temperature_min} °C
                </div>

            </div>
        `;
    });
}

function renderCharts(weather){

    const today =
        weather.slice(0,24);

    const labels =
        today.map(x => formatHour(x.timestamp));

    new Chart(
        document.getElementById("tempChart"),
        {
            type:"line",
            data:{
                labels,
                datasets:[{
                    label:"Temperatur °C",
                    data:today.map(
                        x => x.temperature
                    )
                }]
            }
        }
    );

    new Chart(
        document.getElementById("humidityChart"),
        {
            type:"line",
            data:{
                labels,
                datasets:[{
                    label:"Luftfeuchtigkeit %",
                    data:today.map(
                        x => x.relative_humidity
                    )
                }]
            }
        }
    );

    new Chart(
        document.getElementById("windChart"),
        {
            type:"line",
            data:{
                labels,
                datasets:[{
                    label:"Wind km/h",
                    data:today.map(
                        x => x.wind_speed
                    )
                }]
            }
        }
    );
}

loadWeather();

</script>

</body>
</html>
