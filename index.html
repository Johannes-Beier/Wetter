<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wetter Rottweil</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
    --bg:#0f172a;
    --card:#1e293b;
    --card2:#334155;
    --text:#f8fafc;
    --accent:#38bdf8;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Arial,Helvetica,sans-serif;
    padding:20px;
}

h1,h2{
    margin-bottom:15px;
}

.section{
    margin-bottom:35px;
}

.scroll-row{
    display:flex;
    gap:15px;
    overflow-x:auto;
    padding-bottom:10px;
}

.card{
    background:var(--card);
    border-radius:12px;
    padding:15px;
    min-width:220px;
    flex-shrink:0;
}

.current-card{
    display:flex;
    align-items:center;
    gap:20px;
}

.current-icon{
    width:100px;
    height:100px;
}

.current-temp{
    font-size:3rem;
    font-weight:bold;
}

.details{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:10px;
    margin-top:15px;
}

.detail{
    background:var(--card2);
    padding:10px;
    border-radius:8px;
}

.hour-card{
    text-align:center;
}

.hour-card img{
    width:60px;
    height:60px;
}

.day-card{
    text-align:center;
    min-width:180px;
}

.day-card img{
    width:70px;
    height:70px;
}

.chart-container{
    background:var(--card);
    border-radius:12px;
    padding:15px;
    min-width:450px;
    height:320px;
}

canvas{
    width:100% !important;
    height:250px !important;
}

.loading{
    opacity:.7;
}
</style>
</head>
<body>

<h1>Wetter in Rottweil</h1>

<section class="section">
    <h2>Aktuelles Wetter</h2>
    <div id="current" class="loading">Lade Daten...</div>
</section>

<section class="section">
    <h2>Nächste 24 Stunden</h2>
    <div id="hourly" class="scroll-row"></div>
</section>

<section class="section">
    <h2>Graphen für heute</h2>
    <div class="scroll-row">
        <div class="chart-container">
            <canvas id="tempChart"></canvas>
        </div>

        <div class="chart-container">
            <canvas id="humidityChart"></canvas>
        </div>

        <div class="chart-container">
            <canvas id="windChart"></canvas>
        </div>

        <div class="chart-container">
            <canvas id="pressureChart"></canvas>
        </div>

        <div class="chart-container">
            <canvas id="cloudChart"></canvas>
        </div>
    </div>
</section>

<section class="section">
    <h2>7-Tage-Vorhersage</h2>
    <div id="daily" class="scroll-row"></div>
</section>

<script>

const LAT = 48.1678;
const LON = 8.6272;

const weatherUrl =
`https://api.brightsky.dev/weather?lat=${LAT}&lon=${LON}`;

const dailyUrl =
`https://api.brightsky.dev/weather?lat=${LAT}&lon=${LON}&daily=true`;

async function loadWeather() {

    try {

        const [weatherResponse, dailyResponse] = await Promise.all([
            fetch(weatherUrl),
            fetch(dailyUrl)
        ]);

        const weatherData = await weatherResponse.json();
        const dailyData = await dailyResponse.json();

        const weather = weatherData.weather;

        if (!weather?.length) {
            throw new Error("Keine Wetterdaten erhalten.");
        }

        renderCurrent(weather[0]);
        renderHourly(weather);
        renderDaily(dailyData.weather || []);
        renderCharts(weather);

    } catch(err) {
        console.error(err);

        document.getElementById("current").innerHTML =
            "Fehler beim Laden der Wetterdaten.";
    }
}

function renderCurrent(current) {

    const icon =
        current.icon
            ? `<img class="current-icon" src="${current.icon}" alt="">`
            : "";

    document.getElementById("current").innerHTML = `
        <div class="card">

            <div class="current-card">

                ${icon}

                <div>
                    <div class="current-temp">
                        ${Math.round(current.temperature)}°C
                    </div>
                    <div>${current.condition || "-"}</div>
                </div>

            </div>

            <div class="details">

                <div class="detail">
                    <strong>Bewölkung</strong><br>
                    ${current.cloud_cover ?? "-"} %
                </div>

                <div class="detail">
                    <strong>Windrichtung</strong><br>
                    ${current.wind_direction ?? "-"}°
                </div>

                <div class="detail">
                    <strong>Wind</strong><br>
                    ${current.wind_speed ?? "-"} km/h
                </div>

                <div class="detail">
                    <strong>Luftfeuchtigkeit</strong><br>
                    ${current.relative_humidity ?? "-"} %
                </div>

                <div class="detail">
                    <strong>Luftdruck</strong><br>
                    ${current.pressure_msl ?? "-"} hPa
                </div>

            </div>

        </div>
    `;
}

function renderHourly(weather) {

    const container = document.getElementById("hourly");

    const next24 = weather.slice(0,24);

    container.innerHTML = next24.map(hour => {

        const time = new Date(hour.timestamp);

        return `
            <div class="card hour-card">

                <strong>
                    ${time.toLocaleTimeString("de-DE",{
                        hour:"2-digit",
                        minute:"2-digit"
                    })}
                </strong>

                <br><br>

                ${
                    hour.icon
                    ? `<img src="${hour.icon}" alt="">`
                    : ""
                }

                <div>${Math.round(hour.temperature)}°C</div>

            </div>
        `;

    }).join("");
}

function renderDaily(days) {

    const container = document.getElementById("daily");

    container.innerHTML = days.slice(0,7).map(day => {

        const date = new Date(day.timestamp);

        return `
            <div class="card day-card">

                <strong>
                    ${date.toLocaleDateString("de-DE",{
                        weekday:"short",
                        day:"2-digit",
                        month:"2-digit"
                    })}
                </strong>

                <br><br>

                ${
                    day.icon
                    ? `<img src="${day.icon}" alt="">`
                    : ""
                }

                <div>
                    ↑ ${Math.round(day.temperature_max)}°C
                </div>

                <div>
                    ↓ ${Math.round(day.temperature_min)}°C
                </div>

            </div>
        `;

    }).join("");
}

function createChart(id, label, labels, values) {

    new Chart(
        document.getElementById(id),
        {
            type: "line",
            data: {
                labels,
                datasets: [{
                    label,
                    data: values,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        }
    );
}

function renderCharts(weather) {

    const today = weather.filter(entry => {

        const d = new Date(entry.timestamp);
        const now = new Date();

        return (
            d.getDate() === now.getDate() &&
            d.getMonth() === now.getMonth() &&
            d.getFullYear() === now.getFullYear()
        );

    });

    const labels = today.map(entry => {

        const d = new Date(entry.timestamp);

        return d.toLocaleTimeString("de-DE",{
            hour:"2-digit",
            minute:"2-digit"
        });

    });

    createChart(
        "tempChart",
        "Temperatur (°C)",
        labels,
        today.map(x => x.temperature)
    );

    createChart(
        "humidityChart",
        "Luftfeuchtigkeit (%)",
        labels,
        today.map(x => x.relative_humidity)
    );

    createChart(
        "windChart",
        "Wind (km/h)",
        labels,
        today.map(x => x.wind_speed)
    );

    createChart(
        "pressureChart",
        "Druck (hPa)",
        labels,
        today.map(x => x.pressure_msl)
    );

    createChart(
        "cloudChart",
        "Bewölkung (%)",
        labels,
        today.map(x => x.cloud_cover)
    );
}

loadWeather();

</script>

</body>
</html>
