<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wetter Rottweil</title>

<link rel="preconnect" href="https://api.brightsky.dev">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
    --bg:#0f172a;
    --card:#1e293b;
    --card2:#334155;
    --text:#f8fafc;
    --accent:#38bdf8;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

h2{
    margin-bottom:15px;
}

.section{
    background:var(--card);
    border-radius:16px;
    padding:20px;
    margin-bottom:20px;
}

.current-weather{
    display:flex;
    align-items:center;
    gap:20px;
}

.current-weather img{
    width:80px;
    height:80px;
}

.current-temp{
    font-size:3rem;
    font-weight:bold;
}

.forecast24{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
    gap:12px;
}

.hour-card{
    background:var(--card2);
    border-radius:12px;
    padding:10px;
    text-align:center;
}

.hour-card img{
    width:40px;
    height:40px;
}

.days{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:12px;
}

.day-card{
    background:var(--card2);
    border-radius:12px;
    padding:15px;
}

.day-card img{
    width:50px;
    height:50px;
}

.day-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}

.temp-range{
    font-size:1.1rem;
    font-weight:bold;
}

canvas{
    background:white;
    border-radius:10px;
    padding:10px;
}

.loading{
    text-align:center;
    padding:40px;
}
</style>
</head>
<body>

<h1>🌤 Wetter Rottweil</h1>

<div id="content" class="loading">
    Lade Wetterdaten...
</div>

<script>

const LAT = 48.1678;
const LON = 8.6272;

const iconUrl = (icon) =>
    `https://cdn.jsdelivr.net/gh/jdemaeyer/brightsky-icons/icons/${icon}.svg`;

async function loadWeather(){

    const now = new Date();

    const today = now.toISOString().split("T")[0];

    const weatherUrl =
        `https://api.brightsky.dev/weather?lat=${LAT}&lon=${LON}&date=${today}`;

    const response = await fetch(weatherUrl);
    const data = await response.json();

    const weather = data.weather;

    const current = weather.findLast(entry =>
        new Date(entry.timestamp) <= new Date()
    ) || weather[0];

    render(current, weather);
}

function render(current, weather){

    const next24 = weather
        .filter(w => new Date(w.timestamp) > new Date())
        .slice(0,24);

    const byDay = {};

    weather.forEach(item=>{
        const day = item.timestamp.split("T")[0];

        if(!byDay[day]){
            byDay[day] = [];
        }

        byDay[day].push(item);
    });

    const next7Days = Object.entries(byDay)
        .slice(0,7);

    document.getElementById("content").innerHTML = `

        <div class="section">
            <h2>Aktuelles Wetter</h2>

            <div class="current-weather">
                <img src="${iconUrl(current.icon)}"
                     onerror="this.src='https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/icons/cloud.svg'">

                <div>
                    <div class="current-temp">
                        ${Math.round(current.temperature)}°C
                    </div>

                    <div>${translateCondition(current.condition)}</div>

                    <div>
                        Wind: ${Math.round(current.wind_speed || 0)} km/h
                    </div>

                    <div>
                        Luftfeuchte: ${current.relative_humidity || "-"}%
                    </div>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>Nächste 24 Stunden</h2>

            <div class="forecast24">
                ${next24.map(hour => `
                    <div class="hour-card">
                        <div>
                            ${new Date(hour.timestamp)
                                .toLocaleTimeString('de-DE',{
                                    hour:'2-digit',
                                    minute:'2-digit'
                                })}
                        </div>

                        <img src="${iconUrl(hour.icon)}"
                             onerror="this.style.display='none'">

                        <div>${Math.round(hour.temperature)}°C</div>
                    </div>
                `).join("")}
            </div>
        </div>

        <div class="section">
            <h2>Diagramme für heute</h2>

            <canvas id="tempChart"></canvas>
            <br>
            <canvas id="rainChart"></canvas>
            <br>
            <canvas id="windChart"></canvas>
        </div>

        <div class="section">
            <h2>7-Tage-Vorschau</h2>

            <div class="days">
                ${next7Days.map(([date, values])=>{

                    const max =
                        Math.max(...values.map(v => v.temperature ?? -999));

                    const min =
                        Math.min(...values.map(v => v.temperature ?? 999));

                    const icon =
                        values[Math.floor(values.length/2)]?.icon
                        || "cloudy";

                    return `
                        <div class="day-card">

                            <div class="day-header">
                                <div>
                                    ${new Date(date)
                                        .toLocaleDateString('de-DE',{
                                            weekday:'short',
                                            day:'2-digit',
                                            month:'2-digit'
                                        })}
                                </div>

                                <img src="${iconUrl(icon)}"
                                     onerror="this.style.display='none'">
                            </div>

                            <div class="temp-range">
                                ${Math.round(max)}° /
                                ${Math.round(min)}°
                            </div>

                        </div>
                    `;
                }).join("")}
            </div>
        </div>
    `;

    createCharts(weather);
}

function createCharts(weather){

    const todayData = weather.slice(0,24);

    const labels = todayData.map(item =>
        new Date(item.timestamp)
            .toLocaleTimeString("de-DE",{
                hour:"2-digit"
            })
    );

    new Chart(
        document.getElementById("tempChart"),
        {
            type:"line",
            data:{
                labels,
                datasets:[{
                    label:"Temperatur °C",
                    data:todayData.map(x=>x.temperature)
                }]
            }
        }
    );

    new Chart(
        document.getElementById("rainChart"),
        {
            type:"bar",
            data:{
                labels,
                datasets:[{
                    label:"Niederschlag mm",
                    data:todayData.map(x=>x.precipitation || 0)
                }]
            }
        }
    );

    new Chart(
        document.getElementById("windChart"),
        {
            type:"line",
            data:{
                labels,
                datasets:[{
                    label:"Wind km/h",
                    data:todayData.map(x=>x.wind_speed || 0)
                }]
            }
        }
    );
}

function translateCondition(condition){

    const map = {
        dry:"Trocken",
        rain:"Regen",
        sleet:"Schneeregen",
        snow:"Schnee",
        hail:"Hagel",
        fog:"Nebel",
        thunderstorm:"Gewitter"
    };

    return map[condition] || condition;
}

loadWeather();

</script>

</body>
</html>
